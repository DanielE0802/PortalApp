services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portal-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal-backend-prod
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      REQRES_BASE_URL: ${REQRES_BASE_URL}
      REQRES_API_KEY: ${REQRES_API_KEY}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portal-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_VERSION: ${NEXT_PUBLIC_API_VERSION}
    container_name: portal-frontend-prod
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - portal-network

volumes:
  postgres_prod_data:

networks:
  portal-network:
    driver: bridge
